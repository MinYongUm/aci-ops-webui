# ============================================================
# .github/workflows/ci.yml
# 목적: GitHub Actions CI 파이프라인
#       코드 품질 자동 검증 (flake8 → black → pytest)
#       태그 push 시 Docker Hub 이미지 빌드 + 배포
#
# 트리거:
#   - main 브랜치 push
#   - v* 태그 push (Docker 빌드 + push 추가 실행)
#   - 모든 브랜치 pull_request
#
# 실행 순서:
#   1. flake8  — PEP 8 스타일 검사
#   2. black   — 코드 포맷 검사 (--check 모드, 파일 수정 없음)
#   3. pytest  — API 엔드포인트 단위 테스트
#   4. Slack   — 성공/실패 알림 (항상 실행)
#   5. docker  — 태그 push 시에만 실행 (lint-and-test 통과 후)
#              - Docker Hub 이미지 빌드 + push
#              - Slack 알림
#
# [구조 주의사항]
#   - 진입점은 backend/main.py (루트 플랫 구조 아님)
#   - flake8/black 스코프: backend/ tests/ 만 적용
#   - pytest 실행 위치: 레포 루트 (tests/ 경로 기준)
#   - config.yaml 없음 → tests/conftest.py 패치로 처리됨
#
# [Slack 알림]
#   - 시점: 성공/실패 모두 (if: always())
#   - 내용: 단계별 결과, 커밋 메시지 + 작성자, 브랜치, Actions 링크
#   - 방식: jq로 JSON 생성 → curl로 직접 전송 (특수문자 안전 처리)
#   - Secret: SLACK_WEBHOOK_URL (레포 Settings → Secrets 등록 완료)
#
# [Docker Hub]
#   - Secret: DOCKERHUB_USERNAME, DOCKERHUB_TOKEN
#   - 이미지: ecomminyong/aci-ops-webui
#   - 태그 자동 생성: v1.9.3 push → 1.9.3 / 1.9 / latest
# ============================================================

name: CI

# ============================================================
# 트리거 설정
# ============================================================
on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:

# ============================================================
# 잡(Job) 정의
# ============================================================
jobs:
  lint-and-test:
    name: Lint and Test
    runs-on: ubuntu-latest

    steps:
      # --------------------------------------------------------
      # Step 1: 레포 코드 체크아웃
      # --------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # --------------------------------------------------------
      # Step 2: Python 환경 설정
      # --------------------------------------------------------
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # --------------------------------------------------------
      # Step 3: 의존성 설치
      # --------------------------------------------------------
      - name: Install dependencies
        run: pip install -r requirements_dev.txt

      # --------------------------------------------------------
      # Step 4: flake8 — 코드 스타일 검사
      # continue-on-error: 실패해도 다음 단계 진행 (결과 수집 목적)
      # --------------------------------------------------------
      - name: Run flake8
        id: flake8
        continue-on-error: true
        run: flake8 backend/ tests/

      # --------------------------------------------------------
      # Step 5: black — 코드 포맷 검사
      # --------------------------------------------------------
      - name: Run black
        id: black
        continue-on-error: true
        run: black --check --diff backend/ tests/

      # --------------------------------------------------------
      # Step 6: pytest — API 엔드포인트 단위 테스트
      # --------------------------------------------------------
      - name: Run pytest
        id: pytest
        continue-on-error: true
        run: pytest tests/ -v

      # --------------------------------------------------------
      # Step 7: Slack 알림 + 전체 결과 판정
      # jq로 JSON 생성 → 특수문자(따옴표, 줄바꿈 등) 안전 처리
      # curl로 Webhook URL에 직접 전송
      # --------------------------------------------------------
      - name: Notify Slack
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          FLAKE8_OUTCOME: ${{ steps.flake8.outcome }}
          BLACK_OUTCOME: ${{ steps.black.outcome }}
          PYTEST_OUTCOME: ${{ steps.pytest.outcome }}
          BRANCH: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
          COMMIT_MSG: ${{ github.event.head_commit.message || github.event.pull_request.title }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          # 단계별 결과 계산
          FLAKE8_RESULT=$([ "$FLAKE8_OUTCOME" = "success" ] && echo "PASS" || echo "FAIL")
          BLACK_RESULT=$([ "$BLACK_OUTCOME" = "success" ] && echo "PASS" || echo "FAIL")
          PYTEST_RESULT=$([ "$PYTEST_OUTCOME" = "success" ] && echo "PASS" || echo "FAIL")

          # 전체 결과 판정
          if [[ "$FLAKE8_OUTCOME" == "failure" || "$BLACK_OUTCOME" == "failure" || "$PYTEST_OUTCOME" == "failure" ]]; then
            COLOR="#dc3545"
            TITLE="[FAIL] CI 실패 — aci-ops-webui"
          else
            COLOR="#198754"
            TITLE="[PASS] CI 통과 — aci-ops-webui"
          fi

          STEP_RESULTS="flake8: ${FLAKE8_RESULT}  |  black: ${BLACK_RESULT}  |  pytest: ${PYTEST_RESULT}"

          # jq로 JSON 생성 (특수문자 자동 이스케이프)
          PAYLOAD=$(jq -n \
            --arg color "$COLOR" \
            --arg title "$TITLE" \
            --arg branch "$BRANCH" \
            --arg actor "$ACTOR" \
            --arg commit_msg "$COMMIT_MSG" \
            --arg step_results "$STEP_RESULTS" \
            --arg run_url "$RUN_URL" \
            '{
              attachments: [{
                color: $color,
                blocks: [
                  {
                    type: "header",
                    text: { type: "plain_text", text: $title }
                  },
                  {
                    type: "section",
                    fields: [
                      { type: "mrkdwn", text: ("*브랜치*\n`" + $branch + "`") },
                      { type: "mrkdwn", text: ("*작성자*\n" + $actor) },
                      { type: "mrkdwn", text: ("*커밋 메시지*\n" + $commit_msg) },
                      { type: "mrkdwn", text: ("*단계별 결과*\n" + $step_results) }
                    ]
                  },
                  {
                    type: "actions",
                    elements: [{
                      type: "button",
                      text: { type: "plain_text", text: "Actions 로그 보기" },
                      url: $run_url
                    }]
                  }
                ]
              }]
            }')

          # curl로 Webhook 전송
          curl -s -X POST \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "$SLACK_WEBHOOK_URL"

      # --------------------------------------------------------
      # Step 8: 전체 결과 판정 (job 실패 상태 처리)
      # Notify Slack 이후에 실행하여 알림 후 job 상태 결정
      # --------------------------------------------------------
      - name: Check overall result
        if: always()
        run: |
          if [[ "${{ steps.flake8.outcome }}" == "failure" || \
                "${{ steps.black.outcome }}" == "failure"  || \
                "${{ steps.pytest.outcome }}" == "failure" ]]; then
            exit 1
          fi

  # ============================================================
  # Docker 빌드 + Docker Hub push
  # 조건: lint-and-test 통과 + v* 태그 push 일 때만 실행
  # ============================================================
  docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      # --------------------------------------------------------
      # Step 1: 레포 코드 체크아웃
      # --------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # --------------------------------------------------------
      # Step 2: Docker Hub 로그인
      # --------------------------------------------------------
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # --------------------------------------------------------
      # Step 3: 태그 메타데이터 추출
      # v1.9.3 push 시 → 1.9.3 / 1.9 / latest 3개 태그 자동 생성
      # --------------------------------------------------------
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/aci-ops-webui
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      # --------------------------------------------------------
      # Step 4: Docker 이미지 빌드 + Docker Hub push
      # --------------------------------------------------------
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      # --------------------------------------------------------
      # Step 5: Slack 알림
      # --------------------------------------------------------
      - name: Notify Slack
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          TAG: ${{ github.ref_name }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          STATUS="${{ job.status }}"
          if [ "$STATUS" = "success" ]; then
            COLOR="#198754"
            TITLE="[PUSH] Docker 이미지 배포 완료 — aci-ops-webui"
          else
            COLOR="#dc3545"
            TITLE="[FAIL] Docker 이미지 배포 실패 — aci-ops-webui"
          fi

          PAYLOAD=$(jq -n \
            --arg color "$COLOR" \
            --arg title "$TITLE" \
            --arg tag "$TAG" \
            --arg run_url "$RUN_URL" \
            '{
              attachments: [{
                color: $color,
                blocks: [
                  {
                    type: "header",
                    text: { type: "plain_text", text: $title }
                  },
                  {
                    type: "section",
                    fields: [
                      { type: "mrkdwn", text: ("*태그*\n`" + $tag + "`") },
                      { type: "mrkdwn", text: "*이미지*\neomminyong/aci-ops-webui" }
                    ]
                  },
                  {
                    type: "actions",
                    elements: [{
                      type: "button",
                      text: { type: "plain_text", text: "Actions 로그 보기" },
                      url: $run_url
                    }]
                  }
                ]
              }]
            }')

          curl -s -X POST \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "$SLACK_WEBHOOK_URL"