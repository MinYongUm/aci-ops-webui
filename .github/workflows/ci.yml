# ============================================================
# .github/workflows/ci.yml
# 목적: GitHub Actions CI 파이프라인
#       코드 품질 자동 검증 (flake8 → black → pytest)
#
# 트리거:
#   - main 브랜치 push
#   - 모든 브랜치 pull_request
#
# 실행 순서:
#   1. flake8  — PEP 8 스타일 검사
#   2. black   — 코드 포맷 검사 (--check 모드, 파일 수정 없음)
#   3. pytest  — API 엔드포인트 단위 테스트
#   4. Slack   — 성공/실패 알림 (항상 실행)
#
# [구조 주의사항]
#   - 진입점은 backend/main.py (루트 플랫 구조 아님)
#   - flake8/black 스코프: backend/ tests/ 만 적용
#   - pytest 실행 위치: 레포 루트 (tests/ 경로 기준)
#   - config.yaml 없음 → tests/conftest.py 패치로 처리됨
#
# [Slack 알림]
#   - 시점: 성공/실패 모두 (if: always())
#   - 내용: 단계별 결과, 커밋 메시지 + 작성자, 브랜치, Actions 링크
#   - Secret: SLACK_WEBHOOK_URL (레포 Settings → Secrets 등록 완료)
# ============================================================

name: CI

# ============================================================
# 트리거 설정
# ============================================================
on:
  push:
    branches:
      - main
  pull_request:

# ============================================================
# 잡(Job) 정의
# ============================================================
jobs:
  lint-and-test:
    name: Lint and Test
    runs-on: ubuntu-latest

    steps:
      # --------------------------------------------------------
      # Step 1: 레포 코드 체크아웃
      # --------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # --------------------------------------------------------
      # Step 2: Python 환경 설정
      # --------------------------------------------------------
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # --------------------------------------------------------
      # Step 3: 의존성 설치
      # --------------------------------------------------------
      - name: Install dependencies
        run: pip install -r requirements_dev.txt

      # --------------------------------------------------------
      # Step 4: flake8 — 코드 스타일 검사
      # continue-on-error: 실패해도 다음 단계 진행 (결과 수집 목적)
      # --------------------------------------------------------
      - name: Run flake8
        id: flake8
        continue-on-error: true
        run: flake8 backend/ tests/

      # --------------------------------------------------------
      # Step 5: black — 코드 포맷 검사
      # --------------------------------------------------------
      - name: Run black
        id: black
        continue-on-error: true
        run: black --check --diff backend/ tests/

      # --------------------------------------------------------
      # Step 6: pytest — API 엔드포인트 단위 테스트
      # --------------------------------------------------------
      - name: Run pytest
        id: pytest
        continue-on-error: true
        run: pytest tests/ -v

      # --------------------------------------------------------
      # Step 7: 전체 결과 판정 + Slack 메시지 변수 사전 계산
      # JSON payload 안에서 삼항 표현식 사용 시 파싱 오류 발생
      # → 환경변수로 먼저 계산 후 payload에서 참조하는 방식 사용
      # --------------------------------------------------------
      - name: Check overall result
        id: result
        if: always()
        run: |
          FLAKE8_RESULT="${{ steps.flake8.outcome == 'success' && 'PASS' || 'FAIL' }}"
          BLACK_RESULT="${{ steps.black.outcome == 'success' && 'PASS' || 'FAIL' }}"
          PYTEST_RESULT="${{ steps.pytest.outcome == 'success' && 'PASS' || 'FAIL' }}"

          if [[ "${{ steps.flake8.outcome }}" == "failure" || \
                "${{ steps.black.outcome }}" == "failure"  || \
                "${{ steps.pytest.outcome }}" == "failure" ]]; then
            echo "status=failure" >> $GITHUB_OUTPUT
            echo "color=#dc3545" >> $GITHUB_OUTPUT
            echo "title=[FAIL] CI 실패 — aci-ops-webui" >> $GITHUB_OUTPUT
          else
            echo "status=success" >> $GITHUB_OUTPUT
            echo "color=#198754" >> $GITHUB_OUTPUT
            echo "title=[PASS] CI 통과 — aci-ops-webui" >> $GITHUB_OUTPUT
          fi

          echo "flake8_result=${FLAKE8_RESULT}" >> $GITHUB_OUTPUT
          echo "black_result=${BLACK_RESULT}" >> $GITHUB_OUTPUT
          echo "pytest_result=${PYTEST_RESULT}" >> $GITHUB_OUTPUT

          # job 실패 상태 처리
          if [[ "${{ steps.flake8.outcome }}" == "failure" || \
                "${{ steps.black.outcome }}" == "failure"  || \
                "${{ steps.pytest.outcome }}" == "failure" ]]; then
            exit 1
          fi

      # --------------------------------------------------------
      # Step 8: Slack 알림
      # if: always() — 성공/실패 무관하게 항상 실행
      # payload에서 환경변수(steps.result.outputs.*)를 참조
      # --------------------------------------------------------
      - name: Notify Slack
        if: always()
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "attachments": [
                {
                  "color": "${{ steps.result.outputs.color }}",
                  "blocks": [
                    {
                      "type": "header",
                      "text": {
                        "type": "plain_text",
                        "text": "${{ steps.result.outputs.title }}"
                      }
                    },
                    {
                      "type": "section",
                      "fields": [
                        {
                          "type": "mrkdwn",
                          "text": "*브랜치*\n`${{ github.ref_name }}`"
                        },
                        {
                          "type": "mrkdwn",
                          "text": "*작성자*\n${{ github.actor }}"
                        },
                        {
                          "type": "mrkdwn",
                          "text": "*커밋 메시지*\n${{ github.event.head_commit.message || github.event.pull_request.title }}"
                        },
                        {
                          "type": "mrkdwn",
                          "text": "*단계별 결과*\nflake8: ${{ steps.result.outputs.flake8_result }}  |  black: ${{ steps.result.outputs.black_result }}  |  pytest: ${{ steps.result.outputs.pytest_result }}"
                        }
                      ]
                    },
                    {
                      "type": "actions",
                      "elements": [
                        {
                          "type": "button",
                          "text": {
                            "type": "plain_text",
                            "text": "Actions 로그 보기"
                          },
                          "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                        }
                      ]
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK