# ============================================================
# .github/workflows/ci.yml
# 목적: GitHub Actions CI 파이프라인
#       코드 품질 자동 검증 (flake8 → black → pytest)
#
# 트리거:
#   - main 브랜치 push
#   - 모든 브랜치 pull_request
#
# 실행 순서:
#   1. flake8  — PEP 8 스타일 검사
#   2. black   — 코드 포맷 검사 (--check 모드, 파일 수정 없음)
#   3. pytest  — API 엔드포인트 단위 테스트
#
# [구조 주의사항]
#   - 진입점은 backend/main.py (루트 플랫 구조 아님)
#   - flake8/black 스코프: backend/ tests/ 만 적용
#   - pytest 실행 위치: 레포 루트 (tests/ 경로 기준)
#   - config.yaml 없음 → tests/conftest.py 패치로 처리됨
# ============================================================

name: CI

# ============================================================
# 트리거 설정
# ============================================================
on:
  push:
    branches:
      - main          # main 브랜치 push 시 실행
  pull_request:       # 모든 브랜치 PR 시 실행

# ============================================================
# 잡(Job) 정의
# ============================================================
jobs:
  lint-and-test:
    name: Lint and Test
    runs-on: ubuntu-latest  # GitHub 제공 Ubuntu 러너 사용

    steps:
      # --------------------------------------------------------
      # Step 1: 레포 코드 체크아웃
      # --------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # --------------------------------------------------------
      # Step 2: Python 환경 설정
      # --------------------------------------------------------
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # --------------------------------------------------------
      # Step 3: 의존성 설치
      # requirements-dev.txt → requirements.txt 포함하여 일괄 설치
      # --------------------------------------------------------
      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      # --------------------------------------------------------
      # Step 4: flake8 — 코드 스타일 검사 (PEP 8)
      # 스코프: backend/, tests/ (frontend/ 제외 — Python 파일 없음)
      # --------------------------------------------------------
      - name: Run flake8
        run: flake8 backend/ tests/

      # --------------------------------------------------------
      # Step 5: black — 코드 포맷 검사
      # --check: 실제 파일 수정 없이 포맷 불일치 여부만 확인
      # --diff:  포맷 불일치 발생 시 변경 내용을 로그에 출력
      # 스코프: backend/, tests/
      # --------------------------------------------------------
      - name: Run black
        run: black --check --diff backend/ tests/

      # --------------------------------------------------------
      # Step 6: pytest — API 엔드포인트 단위 테스트
      # 실행 위치: 레포 루트 (tests/ 디렉토리 기준)
      # -v: 테스트 케이스별 결과 상세 출력
      # --------------------------------------------------------
      - name: Run pytest
        run: pytest tests/ -v