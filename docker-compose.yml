# ============================================================
# docker_compose.yml
# 목적: aci-ops-webui 로컬 개발 환경 컨테이너 오케스트레이션
# 용도: 로컬 개발 전용 (운영 배포 목적 아님)
#
# 실행 방법:
#   docker compose up           # 포그라운드 실행 (로그 출력)
#   docker compose up -d        # 백그라운드 실행
#   docker compose down         # 컨테이너 중지 및 제거
#   docker compose logs -f      # 실행 중 로그 확인
#
# 사전 조건:
#   - backend/config.yaml 파일이 존재해야 함
#     (config.yaml.example 복사 후 APIC 접속 정보 입력)
#
# 접속:
#   http://localhost:8000
#
# [보안 주의사항]
#   - config.yaml 은 볼륨 마운트로 주입 (이미지 미포함)
#   - .env 파일로 환경변수 관리 (.env.example 참고)
#   - config.yaml, .env 모두 .gitignore 등록 대상
# ============================================================

services:
  # ============================================================
  # aci-ops-webui 서비스
  # ============================================================
  aci-ops-webui:
    # --------------------------------------------------------
    # 이미지 빌드 설정
    # context: Dockerfile 위치 기준 (프로젝트 루트)
    # --------------------------------------------------------
    build:
      context: .
      dockerfile: Dockerfile

    # --------------------------------------------------------
    # 컨테이너 이름 지정
    # --------------------------------------------------------
    container_name: aci-ops-webui

    # --------------------------------------------------------
    # 포트 매핑
    # 로컬:8000 → 컨테이너:8000
    # --------------------------------------------------------
    ports:
      - "8001:8000"

    # --------------------------------------------------------
    # 볼륨 마운트
    # config.yaml: APIC 접속 정보 주입 (이미지 미포함)
    # --------------------------------------------------------
    volumes:
      - ./backend/config.yaml:/app/backend/config.yaml:ro

    # --------------------------------------------------------
    # 환경변수 파일
    # .env 파일에서 환경변수 로드 (.env.example 참고)
    # --------------------------------------------------------
    env_file:
      - .env

    # --------------------------------------------------------
    # 재시작 정책
    # unless-stopped: 수동으로 중지하지 않는 한 자동 재시작
    # --------------------------------------------------------
    restart: unless-stopped