<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACI Ops — Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        :root {
            --bg-body:      #0d1421;
            --bg-card:      #1b2a3b;
            --bg-input:     #0f1e2e;
            --border-color: #1e3a5f;
            --text-main:    #e4e8ed;
            --text-muted:   #8fa3b8;
            --cisco-blue:   #049fd4;
            --color-danger: #ef4444;
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-wrapper {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        .brand {
            text-align: center;
            margin-bottom: 36px;
        }

        .brand-icon {
            width: 52px;
            height: 52px;
            border-radius: 12px;
            background: var(--cisco-blue);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin-bottom: 14px;
        }

        .brand-name {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--text-main);
            letter-spacing: 2px;
        }

        .brand-tagline {
            font-size: 0.78rem;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 32px;
        }

        .card-title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 24px;
        }

        label {
            font-size: 0.82rem;
            color: var(--text-muted);
            margin-bottom: 6px;
            display: block;
        }

        .form-control {
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 0.9rem;
            width: 100%;
            transition: border-color 0.2s;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--cisco-blue);
            box-shadow: 0 0 0 2px rgba(4, 159, 212, 0.15);
            background: var(--bg-input);
            color: var(--text-main);
        }

        .form-control::placeholder {
            color: #4a6070;
        }

        .input-group {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 0.9rem;
            z-index: 1;
        }

        .input-group .form-control {
            padding-left: 36px;
        }

        .mb-field {
            margin-bottom: 18px;
        }

        .btn-login {
            background: var(--cisco-blue);
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 11px;
            font-size: 0.9rem;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            transition: background 0.2s, opacity 0.2s;
            margin-top: 8px;
        }

        .btn-login:hover { background: #00bceb; }
        .btn-login:disabled { opacity: 0.5; cursor: not-allowed; }

        .error-box {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 0.85rem;
            color: var(--color-danger);
            margin-bottom: 18px;
            display: none;
        }

        .spinner-sm {
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            display: inline-block;
            animation: spin 0.6s linear infinite;
            margin-right: 6px;
            vertical-align: middle;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .footer-note {
            text-align: center;
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <!-- 브랜드 -->
        <div class="brand">
            <div class="brand-icon">
                <i class="bi bi-diagram-3-fill" style="color:#fff;"></i>
            </div>
            <div class="brand-name">ACI OPS</div>
            <div class="brand-tagline">Network Operations Dashboard</div>
        </div>

        <!-- 로그인 카드 -->
        <div class="card">
            <div class="card-title">Sign In</div>

            <!-- 에러 메시지 -->
            <div class="error-box" id="error-box">
                <i class="bi bi-exclamation-circle me-1"></i>
                <span id="error-msg">Invalid username or password.</span>
            </div>

            <!-- Username -->
            <div class="mb-field">
                <label for="username">Username</label>
                <div class="input-group">
                    <i class="bi bi-person input-icon"></i>
                    <input
                        type="text"
                        id="username"
                        class="form-control"
                        placeholder="admin"
                        autocomplete="username"
                        autofocus
                    >
                </div>
            </div>

            <!-- Password -->
            <div class="mb-field">
                <label for="password">Password</label>
                <div class="input-group">
                    <i class="bi bi-lock input-icon"></i>
                    <input
                        type="password"
                        id="password"
                        class="form-control"
                        placeholder="••••••••"
                        autocomplete="current-password"
                    >
                </div>
            </div>

            <!-- 로그인 버튼 -->
            <button class="btn-login" id="btn-login" onclick="doLogin()">
                Sign In
            </button>
        </div>

        <div class="footer-note">
            ACI Ops WebUI v1.9.2
        </div>
    </div>

    <script>
        // Enter 키 처리
        document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') doLogin();
        });
        document.getElementById('username').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') document.getElementById('password').focus();
        });

        async function doLogin() {
            var username = document.getElementById('username').value.trim();
            var password = document.getElementById('password').value;
            var btn = document.getElementById('btn-login');
            var errorBox = document.getElementById('error-box');
            var errorMsg = document.getElementById('error-msg');

            if (!username || !password) {
                errorMsg.textContent = 'Username and password are required.';
                errorBox.style.display = 'block';
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-sm"></span>Signing in...';
            errorBox.style.display = 'none';

            try {
                var resp = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: username, password: password }),
                });

                if (resp.ok) {
                    window.location.href = '/';
                } else {
                    var data = await resp.json();
                    errorMsg.textContent = data.detail || 'Login failed.';
                    errorBox.style.display = 'block';
                    btn.disabled = false;
                    btn.innerHTML = 'Sign In';
                    document.getElementById('password').value = '';
                }
            } catch (e) {
                errorMsg.textContent = 'Connection error. Please try again.';
                errorBox.style.display = 'block';
                btn.disabled = false;
                btn.innerHTML = 'Sign In';
            }
        }
    </script>
</body>
</html>
